name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  # Required for npm Trusted Publishing (OIDC) — no NPM_TOKEN needed.
  id-token: write

jobs:
  binaries:
    name: Build binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - uses: oven-sh/setup-bun@v2
      - run: npm ci
      - run: node scripts/build-binaries.mjs
      - name: Attach binaries to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/pocketstack-*
            bin/SHA256SUMS
            scripts/install.sh
          generate_release_notes: true

  npm:
    name: Publish to npm (OIDC)
    runs-on: ubuntu-latest
    needs: binaries
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm
      # Trusted Publishing requires npm >= 11.5.1.
      - run: npm install -g npm@11.6.2
      - run: npm ci
      - run: npm run build
      - name: Publish (skips if the version already exists)
        run: |
          NAME="$(node -p "require('./package.json').name")"
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "$NAME@$VERSION already published; skipping."
          else
            # OIDC Trusted Publishing: authenticates via id-token, provenance is
            # generated automatically (no NODE_AUTH_TOKEN, no --provenance flag).
            npm publish
          fi
