name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run semantic-release in dry-run mode (no publish)"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - uses: oven-sh/setup-bun@v2
      - name: Update npm (trusted publishing needs >= 11.5.1)
        run: npm install -g npm@latest
      - name: Install dependencies
        run: npm ci
      - name: Build npm bundle
        run: npm run build
      - name: Build standalone binaries
        run: node scripts/build-binaries.mjs
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '--dry-run' || '' }}
